<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
<div class="logo">🌿 PlantCare AI</div>
</div>

<h2 style="text-align:center;margin-top:40px;">
Analysis Complete
</h2>

<div style="display:flex;justify-content:center;margin-top:40px;gap:40px;">

<img src="{{ url_for('static', filename='uploads/' + image_path) }}" width="300">

<div class="result-card">

<h3>{{ plant }}</h3>

{% if condition == "healthy" %}
<p class="healthy">Healthy Plant</p>
{% else %}
<p class="disease">{{ condition }}</p>
{% endif %}

</div>

</div>
</div>

</body>
</html>
